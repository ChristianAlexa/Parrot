name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: make release

      - name: Extract tag annotation
        id: tag_message
        run: |
          # Get annotated tag message; fall back to auto-generated notes if lightweight tag
          MSG=$(git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}")
          if [ -z "$MSG" ]; then
            echo "use_auto=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<TAGEOF"
              echo "$MSG"
              echo "TAGEOF"
            } >> "$GITHUB_OUTPUT"
            echo "use_auto=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release-app/Parrot-*-macos-arm64.zip
          body: ${{ steps.tag_message.outputs.use_auto == 'true' && '' || steps.tag_message.outputs.body }}
          generate_release_notes: ${{ steps.tag_message.outputs.use_auto == 'true' }}
