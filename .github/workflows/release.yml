name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: make release

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release-app/Parrot-*-macos-arm64.zip
          generate_release_notes: true
